<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
                     <!-- Tailwind CSS and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

                        <!-- font awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">  

     <!--google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">

</head>
<body class="google-sans">
<main>
<section class="header">
    <div class="navbar bg-[#15803D] text-white shadow-sm px-4">

        <!-- Left -->
        <div class="navbar-start">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h8m-8 6h16" />
                    </svg>
                </div>

                <ul tabindex="0"
                    class="menu menu-sm dropdown-content bg-white text-black rounded-box z-10 mt-3 w-52 p-2 shadow">
                    <li><a>About</a></li>
                    <li><a>Gallery</a></li>
                    <li><a>Plant a Tree</a></li>
                </ul>
            </div>

            <a class="text-xl font-bold ml-2">Green Earth</a>
        </div>

        <!-- Center -->
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1">
                <li><a>About</a></li>
                <li><a>Gallery</a></li>
                <li><a>Plant a Tree</a></li>
            </ul>
        </div>

        <!-- Right -->
        <div class="navbar-end">
            <a class="bg-[#ffdc50] px-5 py-2 rounded-full text-[#15803D] font-semibold hover:bg-yellow-500 transition">
                Plant a Tree
            </a>
        </div>

    </div>
</section>
<section class="hero-section bg-[#c6ecd5]">
<div class="bg-green-100 py-6 px-2">
    <div class="grid grid-cols-3 items-center justify-between max-w-6xl mx-auto">

        <!-- Left Image -->
        <div class="flex justify-start">
            <img src="assets/hero-leaf1.png" class="w-30 md:w-90 -ml-6 md:-ml-20" alt="">
        </div>

        <!-- Center Text -->
        <div class="text-center px-2">
            <h1 class="text-sm md:text-3xl font-bold text-gray-800">
                Plant a Tree, Grow a Future
            </h1>
            <p class="text-[10px] md:text-base text-gray-600 mt-1">
                Join our mission to plant trees for a greener future.
            </p>
            <button
                class="mt-2 md:mt-4 bg-yellow-400 px-3 py-1 md:px-5 md:py-2 rounded-full text-xs md:text-base font-semibold">
                Get Involved
            </button>
        </div>

        <!-- Right Image -->
        <div class="flex justify-end">
            <img src="assets/hero-leaf2.png" class="w-30 md:w-90 -mr-6 md:-mr-12" alt="">
        </div>

    </div>
</div>
</section>
<div>
    <h1 class="text-3xl text-center m-8 p-8">Choose Your Trees</h1>
</div>
<section class="w-11/12 grid grid-cols-12 mx-auto mt-20 gap-4">
    <div class="bg-white card card-body shadow-2xl col-span-3">
        <h2 class="text-2xl font-bold mb-3">Categories</h2>
        <div class="space-y-3">
            <button class="btn btn-success w-full" id="allTreesbtn">All Trees</button>
        </div>
                <!-- categories container -->
                 <div id="catagoriesContainer" class="space-y-3">
                        <!-- category buttons will be added here -->
                 </div>
    </div>
    <div class="bg-white card card-body shadow-2xl col-span-7 " >

        <div id="treesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Tree cards will be added here -->
        </div>
    </div>
    <div class="bg-white card card-body shadow-2xl col-span-2">
        <h2 class="text-2xl font-bold">Your Cart</h2>
        <div class="space-y-3">
            <!-- cart items will be added here -->
        </div>
    </div>
</section>

</main>
<script src="script/index.js"></script>
</body>
</html>
